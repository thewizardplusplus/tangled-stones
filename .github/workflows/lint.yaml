name: lint
on: [push]
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4"
      - uses: leafo/gh-actions-luarocks@v6
      - name: lint
        run: |
          luarocks install luacheck
          luacheck .
